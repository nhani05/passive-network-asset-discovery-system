# docker-compose.prod.yml – Production overrides
# Dùng: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Khác biệt so với dev:
#   - Kết nối Supabase (remote PostgreSQL)
#   - PGSSLMODE=require
#   - Restart policy: always
#   - Không dùng db container (remote DB)

services:
  db:
    container_name: db-prod
    # Trong production, không cần db container vì dùng Supabase.
    # Scale xuống 0 để không chạy.
    deploy:
      replicas: 0

  pcap-demo:
    container_name: pcap-demo-prod
    restart: always
    environment:
      PGHOST: ${PGHOST}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE}
      PGUSER: ${PGUSER}
      PGPASSWORD: ${PGPASSWORD}
      PGSSLMODE: ${PGSSLMODE:-require}
    # Không depends_on db vì dùng remote database
