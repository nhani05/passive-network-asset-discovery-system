services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-asset_discovery}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-123456}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d asset_discovery"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - default

  pcap-demo:
    build: .
    restart: "no"
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: ${PGDATABASE:-asset_discovery}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-123456}
      PGSSLMODE: disable
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./samples:/samples:ro
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        for attempt in $$(seq 1 30); do
          if pg_isready -h "$${PGHOST}" -p "$${PGPORT}" -U "$${PGUSER}" -d "$${PGDATABASE}" >/dev/null 2>&1; then
            asset-discovery --pcap /samples/multi-asset.pcap --filter "arp or udp port 67 or udp port 68" --output table
            status=$$?
            if [ "$$status" -ne 0 ]; then
              exit "$$status"
            fi
            echo "pcap-demo completed; keeping the container alive for inspection."
            tail -f /dev/null
          fi
          echo "waiting for PostgreSQL to become ready ($$attempt/30)..."
          sleep 2
        done
        echo "error: PostgreSQL was not ready after 60 seconds" >&2
        exit 1

  live-capture:
    profiles: ["live"]
    build: .
    user: "0:0"
    network_mode: host
    entrypoint:
      - /bin/sh
      - -c
    environment:
      CAPTURE_INTERFACE: ${CAPTURE_INTERFACE:-eth0}
      CAPTURE_FILTER: ${CAPTURE_FILTER:-arp or udp port 67 or udp port 68}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    command:
      - |
        set -eu
        exec asset-discovery --interface "${CAPTURE_INTERFACE}" --filter "${CAPTURE_FILTER}" --output table

networks:
  default:
    name: asset-net

volumes:
  postgres-data:
