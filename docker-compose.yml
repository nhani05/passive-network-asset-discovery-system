services:
  db:
    image: postgres:16-alpine
    container_name: db
    environment:
      POSTGRES_DB: asset_discovery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d asset_discovery"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - default

  pcap-demo:
    build: .
    container_name: pcap-demo
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: asset_discovery
      DB_USER: postgres
      DB_PASSWORD: 123456
    volumes:
      - ./samples:/samples:ro
    networks:
      - default
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        for attempt in $$(seq 1 60); do
          if pg_isready -h db -p 5432 -U postgres -d asset_discovery >/dev/null 2>&1; then
            asset-discovery --pcap /samples/multi-asset.pcap --filter "arp or udp port 67 or udp port 68" --output table
            status=$$?
            if [ "$$status" -ne 0 ]; then
              exit "$$status"
            fi
            echo "pcap-demo completed; keeping the container alive for DNS/DB inspection."
            tail -f /dev/null
          fi
          echo "waiting for PostgreSQL to become ready ($$attempt/60)..."
          sleep 2
        done
        echo "error: PostgreSQL was not ready after 120 seconds" >&2
        exit 1

  live-capture:
    profiles: ["live"]
    build: .
    user: "0:0"
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    command:
      - --interface
      - ${CAPTURE_INTERFACE:-eth0}
      - --duration
      - ${CAPTURE_DURATION:-60}
      - --filter
      - ${CAPTURE_FILTER:-arp or udp port 67 or udp port 68}
      - --output
      - table

networks:
  default:
    name: asset-net

volumes:
  postgres-data:
